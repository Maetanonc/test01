<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V CarCare - จัดการพนักงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background-color: #121212; color: #E0E0E0; font-family: sans-serif; }
        .text-orange { color: #FF6B00; }
        .bg-orange { background-color: #FF6B00; color: #121212; }
        .bg-orange:hover { background-color: #E05E00; color: #121212; }
        .card-custom { background-color: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 12px; }
        .form-control-custom { background-color: #2A2A2A; border: 1px solid #3A3A3A; color: #FFFFFF; padding: 12px; }
        .form-control-custom:focus { background-color: #3A3A3A; color: #FFF; border-color: #FF6B00; box-shadow: none; }

        @media (max-width: 767.98px) {
            body { padding-top: 75px; padding-bottom: 40px; }
            .fb-nav-tabs { position: fixed; top: 0; left: 0; right: 0; height: 65px; background-color: #1A1A1A; border-bottom: 1px solid #2A2A2A; display: flex; justify-content: space-around; align-items: stretch; z-index: 1050; }
            .fb-tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8E8E93; text-decoration: none; font-size: 11px; font-weight: bold; border-bottom: 3px solid transparent; }
            .fb-tab-item i { font-size: 22px; margin-bottom: 2px; }
            .fb-tab-item.active { color: #FF6B00; border-bottom-color: #FF6B00; }
        }

        @media (min-width: 768px) {
            .wrapper { display: flex; min-height: 100vh; }
            .sidebar { width: 260px; background-color: #1A1A1A; border-right: 1px solid #2A2A2A; padding: 20px; }
            .sidebar .nav-link { color: #8E8E93; padding: 12px 15px; border-radius: 8px; margin-bottom: 5px; font-weight: bold; }
            .sidebar .nav-link:hover { color: #FFFFFF; background-color: #2A2A2A; }
            .sidebar .nav-link.active { color: #121212; background-color: #FF6B00; }
            .main-content { flex-grow: 1; padding: 30px; background-color: #121212; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Sidebar สำหรับ PC -->
        <div class="sidebar d-none d-md-block">
            <h3 class="text-orange fw-bold text-center mb-4">V CARCARE</h3>
            <nav class="nav flex-column">
                <a class="nav-link logout-link text-danger" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right me-2"></i> ออกจากระบบ</a>
                <a class="nav-link" href="/"><i class="bi bi-speedometer2 me-2"></i> ภาพรวมระบบ</a>
                <a class="nav-link" href="/pos"><i class="bi bi-plus-circle-fill me-2"></i> รับรถหน้าร้าน (POS)</a>
                <a class="nav-link active" href="/staff"><i class="bi bi-people-fill me-2"></i> จัดการพนักงาน</a>
                <a class="nav-link" href="/finance"><i class="bi bi-wallet2 me-2"></i> สรุปบัญชีรายรับ</a>
            </nav>
        </div>

        <!-- แท็บสำหรับมือถือ -->
        <div class="fb-nav-tabs d-flex d-md-none">
            <a href="{{ url_for('logout') }}" class="fb-tab-item logout-link text-danger"><i class="bi bi-box-arrow-right"></i><span>ออกจากระบบ</span></a>
            <a href="/" class="fb-tab-item"><i class="bi bi-speedometer2"></i><span>ภาพรวม</span></a>
            <a href="/pos" class="fb-tab-item"><i class="bi bi-plus-circle-fill"></i><span>รับรถ (POS)</span></a>
            <a href="/staff" class="fb-tab-item active"><i class="bi bi-people-fill"></i><span>พนักงาน</span></a>
            <a href="/finance" class="fb-tab-item"><i class="bi bi-wallet2"></i><span>บัญชี</span></a>
        </div>

        <!-- เนื้อหาหลัก -->
        <div class="main-content w-100 p-3 p-md-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="fw-bold text-white m-0 d-none d-md-block">ระบบพนักงานและเวลาเข้างาน</h2>
                <button class="btn bg-orange text-dark fw-bold px-4 py-2 w-100 w-md-auto" data-bs-toggle="modal" data-bs-target="#addStaffModal">
                    <i class="bi bi-person-plus-fill me-2"></i> ลงทะเบียนพนักงานใหม่
                </button>
            </div>

            <div id="alert-box"></div>

            <div class="row g-2 mb-4">
                <div class="col-6">
                    <div class="card-custom p-3 text-center">
                        <small class="text-secondary">พนักงานในร้าน</small>
                        <h4 class="fw-bold text-white m-0" id="total-staff">0 คน</h4>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card-custom p-3 text-center border-bottom border-success border-3">
                        <small class="text-secondary">มาทำงานวันนี้</small>
                        <h4 class="text-success fw-bold m-0" id="checked-in-staff">0 คน</h4>
                    </div>
                </div>
            </div>

            <div class="card-custom p-3 p-md-4">
                <div id="staff-list">
                    <p class="text-secondary small m-0"><i class="bi bi-hourglass-split me-1"></i>กำลังโหลดข้อมูลพนักงาน...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal เพิ่มพนักงาน -->
    <div class="modal fade" id="addStaffModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered m-3 mx-auto" style="max-width: 450px;">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-orange fw-bold">ลงทะเบียนพนักงานใหม่</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-secondary small">ชื่อ-นามสกุล</label>
                        <input type="text" id="staff-name" class="form-control form-control-custom" placeholder="เช่น สมศักดิ์ รักสะอาด">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small">ตำแหน่ง</label>
                        <input type="text" id="staff-position" class="form-control form-control-custom" placeholder="เช่น ช่างล้างรถ" value="Staff">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small">อัตราค่าแรงต่อวัน (บาท)</label>
                        <input type="number" id="staff-wage" class="form-control form-control-custom" placeholder="เช่น 350">
                    </div>
                    <div class="mb-2">
                        <label class="form-label text-secondary small">รหัส PIN เริ่มต้น (4 หลัก)</label>
                        <input type="text" maxlength="4" id="staff-pin" class="form-control form-control-custom" placeholder="ค่าเริ่มต้น 1234" value="1234">
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn bg-orange text-dark fw-bold w-100" onclick="appendStaff()">บันทึกพนักงาน</button>
                </div>
            </div>
        </div>
    </div>

<script>
    let staffData = [];

    function showAlert(message, type) {
        document.getElementById('alert-box').innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="modal" data-bs-dismiss="alert"></button>
            </div>`;
    }

    function renderStaffList() {
        const container = document.getElementById('staff-list');
        if (staffData.length === 0) {
            container.innerHTML = '<p class="text-secondary small m-0">ยังไม่มีพนักงานในระบบ</p>';
            updateCounters();
            return;
        }

        container.innerHTML = staffData.map(s => {
            const isCheckedIn = !!s.check_in_at && !s.check_out_at;
            const actionBtn = isCheckedIn
                ? `<button class="btn btn-sm btn-outline-success px-3" onclick="toggleCheckIn(${s.id}, 'check_out')"><i class="bi bi-check-circle-fill me-1"></i> เข้างานแล้ว</button>`
                : `<button class="btn btn-sm btn-success px-3" onclick="toggleCheckIn(${s.id}, 'check_in')">เช็คอินเข้างาน</button>`;

            return `
            <div class="p-3 mb-2 rounded-3 border border-secondary staff-item" id="staff-${s.id}" data-checked-in="${isCheckedIn}" style="background-color: #2A2A2A;">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                    <div>
                        <h5 class="text-white fw-bold m-0">${s.full_name}</h5>
                        <small class="text-secondary">รหัส: ${s.employee_code} • ตำแหน่ง: ${s.position} • ค่าแรง <span class="wage-val">${Number(s.daily_wage).toFixed(0)}</span> บ./วัน</small>
                    </div>
                    <div class="d-flex gap-2 align-items-center" id="action-box-${s.id}">
                        ${actionBtn}
                        <button class="btn btn-sm btn-outline-warning" onclick="editWage(${s.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteStaff(${s.id})"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
            </div>`;
        }).join('');

        updateCounters();
    }

    async function loadStaff() {
        try {
            const res = await fetch('/api/staff');
            if (!res.ok) throw new Error('โหลดข้อมูลพนักงานไม่สำเร็จ');
            staffData = await res.json();
            renderStaffList();
        } catch (err) {
            document.getElementById('staff-list').innerHTML = `<p class="text-danger small m-0">${err.message}</p>`;
        }
    }

    async function toggleCheckIn(id, action) {
        try {
            const res = await fetch('/api/staff/attendance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ staff_id: id, action })
            });
            if (!res.ok) throw new Error('บันทึกเวลาเข้า-ออกงานไม่สำเร็จ');
            await loadStaff();
        } catch (err) {
            showAlert(err.message, 'danger');
        }
    }

    async function editWage(id) {
        const staff = staffData.find(s => s.id === id);
        const newWage = prompt("กรอกอัตราค่าแรงใหม่ต่อวัน (บาท):", staff ? staff.daily_wage : '');
        if (newWage === null || newWage.trim() === '' || isNaN(newWage)) return;

        try {
            const res = await fetch(`/api/staff/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ daily_wage: parseFloat(newWage) })
            });
            if (!res.ok) throw new Error('แก้ไขค่าแรงไม่สำเร็จ');
            await loadStaff();
        } catch (err) {
            showAlert(err.message, 'danger');
        }
    }

    async function deleteStaff(id) {
        if (!confirm("คุณต้องการลบรายชื่อพนักงานคนนี้ใช่หรือไม่?")) return;
        try {
            const res = await fetch(`/api/staff/${id}`, { method: 'DELETE' });
            if (!res.ok) throw new Error('ลบพนักงานไม่สำเร็จ');
            await loadStaff();
        } catch (err) {
            showAlert(err.message, 'danger');
        }
    }

    async function appendStaff() {
        const nameInput = document.getElementById('staff-name');
        const positionInput = document.getElementById('staff-position');
        const wageInput = document.getElementById('staff-wage');
        const pinInput = document.getElementById('staff-pin');

        const name = nameInput.value.trim();
        const wage = wageInput.value.trim();

        if (!name || !wage) {
            alert('กรุณากรอกข้อมูลให้ครบถ้วน');
            return;
        }

        try {
            const res = await fetch('/api/staff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    full_name: name,
                    position: positionInput.value.trim() || 'Staff',
                    daily_wage: parseFloat(wage),
                    pin_code: pinInput.value.trim() || '1234'
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || data.error || 'บันทึกไม่สำเร็จ');

            await loadStaff();

            nameInput.value = '';
            wageInput.value = '';
            positionInput.value = 'Staff';
            pinInput.value = '1234';

            const modalEl = document.getElementById('addStaffModal');
            const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
            modalInstance.hide();

            showAlert(`เพิ่มพนักงาน ${data.staff.full_name} (รหัส ${data.staff.employee_code}, PIN: ${data.staff.pin_code}) สำเร็จ`, 'success');
        } catch (err) {
            showAlert(err.message, 'danger');
        }
    }

    function updateCounters() {
        const totalStaff = staffData.length;
        const checkedInStaff = staffData.filter(s => s.check_in_at && !s.check_out_at).length;

        document.getElementById('total-staff').innerText = totalStaff + " คน";
        document.getElementById('checked-in-staff').innerText = checkedInStaff + " คน";
    }

    window.addEventListener('DOMContentLoaded', () => {
        loadStaff();
        setInterval(loadStaff, 15000);
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
